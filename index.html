<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HellFest 2026 — HellTeam</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a08; --bg2: #111108; --bg3: #1a1a12;
  --green: #7dc44a; --green2: #5a9933; --green3: #2d5a1b;
  --orange: #e8842a; --cream: #d4c9a8; --cream2: #a89f82;
  --red: #c42a2a; --border: #2a2a1a; --border2: #3a3a22;
  --slot-h: 56px; --col-w: 160px; --time-w: 52px;
}
body.light-mode {
  --bg: #f0ece0; --bg2: #e4dfc8; --bg3: #d8d2bc;
  --cream: #1a1a12; --cream2: #5a5040;
  --border: #c8c2a8; --border2: #b8b098;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--cream); font-family: 'Oswald', sans-serif; overflow: hidden; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }

.header {
  background: var(--bg2); border-bottom: 2px solid var(--green3);
  padding: 10px 14px 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; position: relative;
}
.header-logo { font-family: 'Creepster', cursive; font-size: 22px; color: var(--green); letter-spacing: 1px; line-height: 1; }
.header-logo span { color: var(--orange); font-size: 14px; display: block; letter-spacing: 3px; font-family: 'Special Elite', serif; }
.header-subtitle { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Special Elite', serif; font-size: 11px; color: var(--cream2); letter-spacing: 2px; text-transform: uppercase; }
.header-user { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px 4px 4px; cursor: pointer; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; border: 2px solid; }
.user-name { font-size: 13px; font-weight: 600; letter-spacing: 1px; }

.grid-wrapper { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
.grid-container { display: flex; min-width: calc(var(--time-w) + var(--col-w) * 6); padding-bottom: 8px; }
.time-col { width: var(--time-w); flex-shrink: 0; padding-top: 48px; }
.time-slot { height: var(--slot-h); display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-family: 'Special Elite', serif; font-size: 11px; color: var(--cream2); border-right: 1px solid var(--border); }
.stages-container { display: flex; flex: 1; }
.stage-col { width: var(--col-w); flex-shrink: 0; border-right: 1px solid var(--border); }
.stage-header { height: 48px; display: flex; align-items: center; justify-content: center; font-family: 'Creepster', cursive; font-size: 13px; letter-spacing: 1px; border-bottom: 2px solid var(--green3); position: sticky; top: 0; z-index: 10; background: var(--bg2); }
.stage-header.ms1 { color: var(--green); border-bottom-color: var(--green); }
.stage-header.ms2 { color: var(--green2); border-bottom-color: var(--green2); }
.stage-header.wz { color: var(--orange); border-bottom-color: var(--orange); }
.stage-header.valley { color: #9b7fd4; border-bottom-color: #9b7fd4; }
.stage-header.altar { color: var(--red); border-bottom-color: var(--red); }
.stage-header.temple { color: #5bc4c4; border-bottom-color: #5bc4c4; }
.stage-body { position: relative; }

.concert-block {
  position: absolute; left: 3px; right: 3px;
  background: var(--bg3); border-radius: 5px;
  padding: 4px 6px 5px; cursor: pointer; overflow: hidden;
  transition: transform 0.1s;
  display: flex; flex-direction: column; gap: 2px;
  border-top: 2px solid var(--border2);
  border-right: 2px solid var(--border2);
  border-bottom: 2px solid var(--border2);
  border-left: 2px solid var(--border2);
}
.cb-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 3px; }
.cb-row2 { display: flex; justify-content: space-between; align-items: baseline; gap: 3px; }
.cb-time-start { font-size: 9px; color: var(--cream2); font-family: 'Special Elite', serif; white-space: nowrap; flex-shrink: 0; }
.cb-time-end { font-size: 9px; color: var(--cream2); font-family: 'Special Elite', serif; white-space: nowrap; flex-shrink: 0; }
.concert-block:active { transform: scale(0.97); }
.concert-name { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--cream); line-height: 1.2; text-transform: uppercase; padding-right: 16px; }
.concert-genre { font-size: 8px; color: var(--cream2); font-family: 'Special Elite', serif; margin-top: 1px; }
.concert-time-unused { font-size: 8px; color: var(--cream2); margin-top: 2px; }
.concert-country-unused { font-size: 9px; position: absolute; top: 4px; right: 5px; }

/* AVATARS */
.avatars { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.av-wrap { position: relative; display: inline-flex; flex-direction: column; align-items: center; overflow: visible; }
.av { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.av-badge { position: absolute; top: -4px; right: -4px; width: 11px; height: 11px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; border: 1px solid var(--bg3); line-height: 1; z-index: 2; }
.av-badge.must { background: transparent; color: var(--green); font-size: 9px; }
.av-badge.maybe { background: #3a3a2a; color: var(--cream2); }
.av-badge.seen { background: #2d1a4a; color: #9b7fd4; font-size:9px; }

/* LICORNE */
.unicorn-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.unicorn-icon { font-size: 20px; }
.unicorn-text { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: linear-gradient(90deg,#ff6eb4,#ffd740,#69f0ae,#4fc3f7,#ce93d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.unicorn-count { font-size: 9px; color: var(--cream2); }

.bottom-nav { background: var(--bg2); border-top: 2px solid var(--border2); display: flex; flex-shrink: 0; }
.nav-btn { flex: 1; padding: 8px 4px 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; color: var(--cream2); font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 1px; transition: color 0.15s; }
.nav-btn.active { color: var(--green); }
.nav-btn:last-child { border-left: 1px solid var(--border2); }
.nav-icon { font-size: 18px; }
.nav-h-icon { width: 22px; height: 22px; font-family: 'Creepster', cursive; font-size: 18px; color: var(--green); display: flex; align-items: center; justify-content: center; }

.context-overlay { position: fixed; inset: 0; z-index: 999; display: none; }
.context-overlay.show { display: block; }
.context-menu { position: fixed; z-index: 1000; background: var(--bg2); border: 1px solid var(--green3); border-radius: 10px; min-width: 240px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); overflow: hidden; display: none; }
.context-menu.show { display: block; }
.context-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border2); }
.context-band { font-family: 'Creepster', cursive; font-size: 17px; color: var(--green); letter-spacing: 1px; }
.context-info { font-size: 11px; color: var(--cream2); font-family: 'Special Elite', serif; margin-top: 2px; }
.context-options { padding: 6px 0; }
.context-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; letter-spacing: 1px; transition: background 0.1s; }
.context-option:hover { background: var(--bg3); }
.context-option .opt-icon { font-size: 16px; width: 20px; text-align: center; }
.context-option.must { color: var(--green); }
.context-option.maybe { color: var(--orange); }
.context-option.remove { color: var(--cream2); border-top: 1px solid var(--border); }

.drawer-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.7); display: none; }
.drawer-overlay.show { display: block; }
.drawer { position: fixed; top: 0; right: -320px; bottom: 0; width: 300px; background: var(--bg2); border-left: 2px solid var(--green3); z-index: 401; transition: right 0.3s ease; display: flex; flex-direction: column; overflow: hidden; }
.drawer.open { right: 0; }
.drawer-header { padding: 14px 16px; border-bottom: 1px solid var(--border2); font-family: 'Creepster', cursive; font-size: 20px; color: var(--green); letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
.drawer-close { background: none; border: none; color: var(--cream2); font-size: 20px; cursor: pointer; }
.drawer-body { flex: 1; overflow-y: auto; padding: 14px; display: block; }
.search-box { width: 100%; padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--cream); font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 1px; margin-bottom: 0; display: block; }
.search-box:focus { outline: none; border-color: var(--green2); }
.search-box::placeholder { color: var(--cream2); }

.collective-title { font-family: 'Creepster', cursive; font-size: 16px; color: var(--orange); letter-spacing: 1px; margin-bottom: 10px; }
.collective-user { margin-bottom: 12px; }
.collective-user-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.collective-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1.5px solid; }
.collective-uname { font-size: 13px; font-weight: 600; letter-spacing: 1px; }
.collective-concerts { padding-left: 32px; }
.collective-concert { font-size: 11px; color: var(--cream2); padding: 2px 0; font-family: 'Special Elite', serif; display: flex; align-items: baseline; gap: 0; }
.cc-icon { width: 18px; flex-shrink: 0; text-align: center; font-style: normal; }
.cc-text { flex: 1; min-width: 0; padding-left: 4px; }

/* MON STYLE */
.my-style-bar {
  display:flex; align-items:center; gap:6px;
  padding:6px 10px; margin-bottom:8px;
  background:var(--bg3); border-radius:6px;
  border:1px solid var(--border2);
  font-family:'Special Elite',serif;
  font-size:11px; color:var(--green);
  min-height:28px;
}
.my-style-label { color:var(--cream2); font-size:9px; letter-spacing:1px; font-family:'Oswald',sans-serif; white-space:nowrap; }
.my-style-genres { color:var(--green); font-size:11px; flex:1; }

.no-selections { font-size: 11px; color: var(--cream2); font-family: 'Special Elite', serif; font-style: italic; }

.user-modal { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; }
.user-modal.show { display: flex; }
.user-modal-box { background: var(--bg2); border: 2px solid var(--green3); border-radius: 12px; padding: 20px; width: 280px; }
.user-modal-title { font-family: 'Creepster', cursive; font-size: 22px; color: var(--green); text-align: center; margin-bottom: 16px; }
.user-list { display: flex; flex-direction: column; gap: 8px; }
.user-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; transition: border-color 0.15s; }
.user-item:hover { border-color: var(--green2); }
.user-item-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; border: 2px solid; }
.user-item-name { font-size: 15px; font-weight: 600; letter-spacing: 1px; }



.mode-toggle { display: flex; flex-direction: row; align-items: center; gap: 8px; margin-bottom: 12px; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; width: 100%; }
.mode-toggle-label { font-size: 12px; letter-spacing: 1px; color: var(--cream); flex: 1; }
.mode-toggle-switch { width: 36px; height: 20px; background: var(--border2); border-radius: 10px; position: relative; transition: background 0.2s; }
.mode-toggle-switch.on { background: var(--green2); }
.mode-toggle-switch::after { content:''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--cream); transition: left 0.2s; }
.mode-toggle-switch.on::after { left: 19px; }

/* ORPHAN MODAL */
.orphan-modal { position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center; }
.orphan-modal.show { display:flex; }
.orphan-box { background:var(--bg2);border:2px solid var(--red);border-radius:12px;padding:20px;width:280px; }
.orphan-title { font-family:'Creepster',cursive;font-size:18px;color:var(--red);margin-bottom:10px; }
.orphan-item { font-size:12px;color:var(--cream);padding:4px 0;font-family:'Special Elite',serif; }
.orphan-close { margin-top:14px;width:100%;padding:8px;background:var(--red);border:none;color:#fff;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;border-radius:6px;cursor:pointer; }

/* LIGNE HEURE ACTUELLE */
.current-time-line { position:absolute;left:0;right:0;height:2px;background:#ff2222;z-index:5;pointer-events:none; }
.current-time-line::before { content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:#ff2222;border-radius:50%; }

/* TIROIR ONGLETS */
.drawer-tabs { display:flex;flex-direction:row;gap:0;margin-bottom:10px;border:1px solid var(--border2);border-radius:6px;overflow:hidden;width:100%; }
.dtab { flex:1;padding:8px 4px;text-align:center;font-size:11px;letter-spacing:0.5px;cursor:pointer;color:var(--cream2);background:var(--bg3);border:none;font-family:'Oswald',sans-serif;transition:all 0.15s;min-width:0; }
.dtab.active { background:var(--green3);color:var(--green); }

/* PROG PERSO */
.planning-section { margin-bottom:14px; }
.planning-day-label { font-family:'Creepster',cursive;font-size:13px;color:var(--orange);letter-spacing:1px;padding:4px 0 6px;border-bottom:1px solid var(--border2);margin-bottom:6px;display:flex;align-items:center;gap:6px; }
.planning-day-count { font-size:9px;color:var(--cream2);font-family:'Oswald',sans-serif; }
.planning-item { display:flex;align-items:center;gap:0;padding:5px 6px;border-radius:4px;margin-bottom:4px;background:var(--bg3);border-left:3px solid; }
.planning-item.must { border-left-color:var(--green); }
.planning-item.maybe { border-left-color:var(--orange);opacity:0.85; }
.planning-item.seen { border-left-color:#9b7fd4; }
.planning-badge { font-size:12px;width:20px;flex-shrink:0;text-align:center;line-height:1; }
.planning-time { font-size:9px;color:var(--cream2);font-family:'Special Elite',serif;white-space:nowrap;width:36px;flex-shrink:0; }
.planning-info { flex:1;min-width:0; }
.planning-name { font-size:10px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:0.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.planning-meta { font-size:7px;color:var(--cream2);font-family:'Special Elite',serif;margin-top:1px; }
.planning-stage { font-size:7px;font-weight:600;letter-spacing:0.5px;margin-top:1px; }

.planning-friends { display:flex;gap:2px;margin-top:3px;flex-wrap:wrap; }
.pf-av { width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px; }

/* MON STYLE */
.my-style-bar {
  display:flex; align-items:center; gap:6px;
  padding:6px 10px; margin-bottom:8px;
  background:var(--bg3); border-radius:6px;
  border:1px solid var(--border2);
  font-family:'Special Elite',serif;
  font-size:11px; color:var(--green);
  min-height:28px;
}
.my-style-label { color:var(--cream2); font-size:9px; letter-spacing:1px; font-family:'Oswald',sans-serif; white-space:nowrap; }
.my-style-genres { color:var(--green); font-size:11px; flex:1; }

.no-selections { font-size:11px;color:var(--cream2);font-family:'Special Elite',serif;font-style:italic; }

/* EXPORT PLAYLIST */
.export-section { margin-top:16px;padding-top:12px;border-top:1px solid var(--border2); }
.export-title { font-family:'Creepster',cursive;font-size:14px;color:var(--green);letter-spacing:1px;margin-bottom:8px; }
.export-locked { font-size:10px;color:var(--cream2);font-family:'Special Elite',serif;font-style:italic;padding:8px;background:var(--bg3);border-radius:6px;border:1px solid var(--border2); }
.stream-pick { display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap; }
.stream-btn { flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--cream2);font-family:'Oswald',sans-serif;font-size:10px;cursor:pointer;text-align:center;transition:all 0.15s;min-width:60px; }
.stream-btn.active { border-color:var(--green);color:var(--green);background:rgba(125,196,74,0.1); }
.export-list { display:flex;flex-direction:column;gap:6px;margin-bottom:10px; }
.export-item { display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg3);border-radius:6px;border:1px solid var(--border2); }
.export-name { flex:1;font-size:10px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:0.5px; }
.export-link { font-size:11px;padding:3px 8px;background:var(--green3);border:1px solid var(--green2);color:var(--green);border-radius:4px;text-decoration:none;font-family:'Oswald',sans-serif;letter-spacing:1px;cursor:pointer; }
.copy-all-btn { width:100%;padding:8px;background:var(--bg3);border:1px solid var(--green2);color:var(--green);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;border-radius:6px;cursor:pointer; }


/* PROG TEAM */
.team-view { display:flex; flex-direction:column; height:100%; overflow-y:auto; scrollbar-width:none; }
.team-view::-webkit-scrollbar { display:none; }
.team-day-header { padding:10px 14px 6px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.team-day-title { font-family:'Creepster',cursive; font-size:16px; color:var(--orange); letter-spacing:1px; }
.team-day-count { font-size:10px; color:var(--cream2); font-family:'Special Elite',serif; }

.team-card { margin:5px 10px; background:var(--bg3); border-radius:6px; padding:7px 9px; position:relative; border-left:3px solid var(--border2); }
.team-card.priority { border-left-color:var(--green); }
.team-card.solo { border-left-color:var(--border2); opacity:0.75; }
.team-card.conflict-wrap { border:1px dashed var(--orange); border-radius:6px; margin:5px 10px; padding:7px 9px; background:var(--bg3); }
.conflict-header { font-size:8px; color:var(--orange); font-family:'Oswald',sans-serif; letter-spacing:1px; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
.conflict-divider { height:1px; background:#3a2a0a; margin:6px 0; }
.conflict-alt { opacity:0.7; }
.tc-top { display:flex; align-items:baseline; gap:6px; margin-bottom:3px; }
.tc-time { font-size:9px; color:var(--cream2); font-family:'Special Elite',serif; white-space:nowrap; }
.tc-name { font-size:11px; font-weight:700; color:var(--cream); text-transform:uppercase; letter-spacing:0.3px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-scene { font-size:8px; font-weight:600; letter-spacing:1px; margin-bottom:2px; }
.tc-genre { font-size:8px; color:var(--cream2); font-family:'Special Elite',serif; margin-bottom:4px; }
.tc-avatars { display:flex; gap:3px; flex-wrap:wrap; }
.tc-av { width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; position:relative; flex-shrink:0; }
.tc-av-b { position:absolute; top:-3px; right:-3px; width:9px; height:9px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:6px; border:1px solid var(--bg3); }

.empty-slot { margin:3px 10px; padding:4px 10px; background:var(--bg2); border-radius:4px; border:1px dashed var(--border2); display:flex; align-items:center; gap:6px; }
.empty-time { font-size:8px; color:#5a5a42; font-family:'Special Elite',serif; }
.empty-label { font-size:8px; color:#5a5a42; letter-spacing:1px; font-style:italic; }

/* STATS */
.stats-section { margin:8px 10px 14px; background:var(--bg2); border-radius:8px; padding:10px; border:1px solid var(--border2); }
.stats-title { font-size:9px; color:var(--cream2); letter-spacing:2px; text-transform:uppercase; font-family:'Oswald',sans-serif; margin-bottom:8px; border-bottom:1px solid var(--border2); padding-bottom:4px; }
.stat-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.stat-label { font-size:9px; color:var(--cream2); font-family:'Special Elite',serif; width:52px; flex-shrink:0; }
.stat-bar-wrap { flex:1; height:5px; background:var(--border2); border-radius:3px; overflow:hidden; }
.stat-bar { height:100%; border-radius:3px; transition:width 0.4s ease; }
.stat-val { font-size:9px; color:var(--cream); font-family:'Oswald',sans-serif; width:30px; text-align:right; flex-shrink:0; }
.stat-highlight { display:flex; align-items:center; gap:6px; padding:5px 0; border-top:1px solid var(--border2); margin-top:4px; }
.stat-hl-icon { font-size:13px; width:18px; text-align:center; flex-shrink:0; }
.stat-hl-text { font-size:9px; color:var(--cream2); font-family:'Special Elite',serif; flex:1; }

#teamView {

  background: var(--bg);
  z-index: 300;
  flex-direction: column;
  overflow: hidden;
}

.team-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.team-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 14px 20px;
}

.team-view-title {
  font-family: 'Creepster', cursive;
  font-size: 18px; color: var(--green);

.team-card { background: var(--bg3); border-radius:7px; padding:10px 12px; margin-bottom:8px; border-left:3px solid var(--green); display:flex; flex-direction:column; gap:3px; }

.tc-top { display:flex; align-items:baseline; gap:8px; }
.tc-time { font-size:10px; color:var(--cream2); font-family:'Special Elite',serif; white-space:nowrap; flex-shrink:0; }
.tc-name { font-size:12px; font-weight:700; color:var(--cream); text-transform:uppercase; letter-spacing:0.5px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-scene { font-size:9px; font-weight:600; letter-spacing:1px; }
.tc-genre { font-size:9px; color:var(--cream2); font-family:'Special Elite',serif; }
.tc-avatars { display:flex; gap:3px; flex-wrap:wrap; margin-top:3px; }
.tc-av { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; position:relative; flex-shrink:0; }
.tc-av-b { position:absolute; top:-3px; right:-3px; width:9px; height:9px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:6px; border:1px solid var(--bg3); }
.tc-conflict-label { font-size:9px; color:var(--orange); letter-spacing:1px; margin-bottom:5px; }
.tc-conflict-sep { height:1px; background:#3a2a0a; margin:5px 0; }

.team-empty { margin-bottom:5px; padding:5px 10px; background:var(--bg2); border-radius:4px; border:1px dashed var(--border); display:flex; align-items:center; gap:8px; }
.team-empty-time { font-size:9px; color:#5a5a42; font-family:'Special Elite',serif; }
.team-empty-label { font-size:9px; color:#5a5a42; font-style:italic; }

.stats-section { background:var(--bg2); border-radius:8px; padding:12px 14px; border:1px solid var(--border2); margin-top:14px; }
.stats-title { font-size:10px; color:var(--cream2); letter-spacing:2px; text-transform:uppercase; font-family:'Oswald',sans-serif; margin-bottom:10px; }
.stage-pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.stage-pill { display:flex; align-items:center; gap:6px; background:var(--bg3); border-radius:20px; padding:5px 10px; }
.pill-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.pill-name { font-size:10px; color:var(--cream2); font-family:'Oswald',sans-serif; letter-spacing:0.5px; }
.pill-pct { font-size:11px; font-weight:700; color:var(--cream); font-family:'Oswald',sans-serif; }
.stat-highlight { display:flex; align-items:center; gap:8px; padding:4px 0; border-top:1px solid var(--border2); margin-top:2px; }
.stat-highlight:first-of-type { margin-top:8px; padding-top:8px; }
.stat-hl-icon { font-size:13px; width:18px; text-align:center; flex-shrink:0; }
.stat-hl-text { font-size:10px; color:var(--cream2); font-family:'Special Elite',serif; flex:1; }
.stat-hl-val { font-size:10px; color:var(--green); font-family:'Oswald',sans-serif; }
.no-team-data { padding:30px 20px; text-align:center; font-family:'Special Elite',serif; font-size:13px; color:var(--cream2); font-style:italic; }

function timeToMinutes(t) {
  const [h,m] = t.split(':').map(Number);
  return h < 6 ? (h+24)*60+m : h*60+m;
}
function getDayBounds(dayName) {
  let minT=Infinity, maxT=-Infinity;
  for (const stage of Object.values(SCHEDULE[dayName])) {
    for (const c of stage) {
      minT = Math.min(minT, timeToMinutes(c.start));
      maxT = Math.max(maxT, timeToMinutes(c.end));
    }
  }
  return {minT, maxT};
}
function formatTimeLabel(mins) {
  return (Math.floor(mins/60)%24).toString().padStart(2,'0')+'h';
}

let _localUpdate = false; // flag pour ignorer notre propre update Firebase

function startFirebaseSync() {
  const onData = data => {
    if (!data) return;
    if (_localUpdate) { _localUpdate = false; return; }
    selections = decodeSelections(data);
    try { localStorage.setItem('hf2026_sel', JSON.stringify(selections)); } catch(e){}
    if (!document.getElementById('ctxMenu').classList.contains('show')) {
      renderDay();
      updateCollective();
      computeMyStyle();
    }
  };
  if (window.firebaseReady) {
    window.fbListen('selections', onData);
  } else {
    document.addEventListener('firebase-ready', () => {
      window.fbListen('selections', onData);
    });
  }
}

function updateCurrentTimeLine() {
  var ctLines = document.querySelectorAll('.current-time-line'); if(ctLines) ctLines.forEach(function(e){e.remove();});
  const now = new Date();
  const todayIdx = [18,19,20,21].indexOf(now.getDate());
  // Vérifier si on est en juin 2026 et que le jour affiché = aujourd'hui
  const isJune2026 = now.getFullYear()===2026 && now.getMonth()===5;
  if (!isJune2026 || todayIdx === -1 || todayIdx !== currentDay) return;

  const dayName = DAYS[currentDay];
  const {minT, maxT} = getDayBounds(dayName);
  const nowMins = now.getHours() < 6 ? (now.getHours()+24)*60+now.getMinutes() : now.getHours()*60+now.getMinutes();
  if (nowMins < minT || nowMins > maxT) return;

  const SLOT_H = 56;
  const topPx = (nowMins - minT) / 60 * SLOT_H + 48; // +48 pour le header scène
  document.querySelectorAll('.stage-body').forEach(body => {
    const line = document.createElement('div');
    line.className = 'current-time-line';
    line.style.top = (topPx - 48) + 'px';
    body.appendChild(line);
  });
}

function fireTransition(nextDay) {
  if (nextDay === currentDay) return;
  const screen = document.getElementById('gridWrapper');
  // Créer overlay feu temporaire
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:radial-gradient(ellipse at 50% 110%,#ff4500 0%,#ff6a00 15%,#dd2200 35%,#660000 60%,#1a0000 80%,transparent 100%);transition:opacity 0.18s ease-in;';
  document.body.appendChild(overlay);

  // Braises
  const embers = document.createElement('div');
  embers.style.cssText = 'position:fixed;inset:0;z-index:501;pointer-events:none;overflow:hidden;';
  for(let i=0;i<20;i++){
    const e=document.createElement('div');
    const sz=2+Math.random()*5, x=Math.random()*100, dx=(Math.random()-0.5)*60, dur=0.4+Math.random()*0.35, delay=Math.random()*0.2;
    const colors=['#ff6a00','#ff4500','#ffaa00','#ffee00'];
    const c=colors[Math.floor(Math.random()*colors.length)];
    e.style.cssText=`position:absolute;border-radius:50%;width:${sz}px;height:${sz}px;left:${x}%;bottom:${10+Math.random()*30}%;background:${c};box-shadow:0 0 ${sz+2}px ${c};animation:riseEmber ${dur}s ease-out ${delay}s forwards;--dx:${dx}px;`;
    embers.appendChild(e);
  }
  document.body.appendChild(embers);

  requestAnimationFrame(()=>{
    overlay.style.opacity='0.88';
    setTimeout(()=>{
      setDayInternal(nextDay);
      overlay.style.transition='opacity 0.3s ease-out';
      overlay.style.opacity='0';
      setTimeout(()=>{ overlay.remove(); embers.remove(); },350);
    },200);
  });
}

  document.getElementById('gridWrapper').scrollTo(0,0);
}

function getSeenConcerts() {
  const uSel = selections[currentUser?.id] || {};
  return Object.entries(uSel).filter(([k,v])=>v==='seen').map(([k])=>{
    const [d,s,n]=k.split('|');
    const c=(SCHEDULE[d]?.[s]||[]).find(x=>x.name===n);
    return {key:k, name:n, day:d, stage:s, start:c?.start||''};
  }).sort((a,b)=>{
    const di=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    if(di) return di;
    return timeToMinutes(a.start)-timeToMinutes(b.start);
  });
}


function renderPlanning() {
  if (!currentUser) { document.getElementById('panel-planning').innerHTML='<div class="no-selections">Sélectionne ton prénom pour voir ton planning.</div>'; return; }
  const uSel = selections[currentUser.id] || {};
  const keys = Object.keys(uSel);
  if (!keys.length) { document.getElementById('panel-planning').innerHTML='<div class="no-selections">Aucune sélection pour l\'instant.</div>'; return; }

  // Grouper par jour
  const byDay = {};
  DAYS.forEach(d=>byDay[d]=[]);
  keys.forEach(k=>{
    const [d,s,n]=k.split('|');
    if(!byDay[d]) return;
    const type=uSel[k];
    const c=(SCHEDULE[d]?.[s]||[]).find(x=>x.name===n);
    if(c) byDay[d].push({key:k,name:n,stage:s,start:c.start,genre:c.genre,country:c.country,type});
  });

  const DAY_ICONS = ['🔥','⚔️','💀','🤘'];
  const STAGE_COLORS_MAP = {'MAINSTAGE 1':'#7dc44a','MAINSTAGE 2':'#5a9933','WARZONE':'#e8842a','VALLEY':'#9b7fd4','ALTAR':'#c42a2a','TEMPLE':'#5bc4c4'};

  let html = '';
  DAYS.forEach((d,di)=>{
    const concerts = byDay[d].sort((a,b)=>timeToMinutes(a.start)-timeToMinutes(b.start));
    if(!concerts.length) return;
    html+=`<div class="planning-section">
      <div class="planning-day-label">${DAY_ICONS[di]} ${d.toUpperCase()} <span class="planning-day-count">${concerts.length} concert${concerts.length>1?'s':''}</span></div>`;
    concerts.forEach(c=>{

  { label:'Thrash Metal',  keys:['thrash','crossover'] },

];

function getGenreFamily(genre) {
  const g = genre.toLowerCase();
  for (const fam of GENRE_FAMILIES) {
    if (fam.keys.some(k => g.includes(k))) return fam.label;
  }
  return 'Divers';
}

function computeMyStyle() {
  if (!currentUser) return;
  const uSel = selections[currentUser.id] || {};
  const keys = Object.keys(uSel);
  if (!keys.length) {
    document.getElementById('myStyleBar').style.display = 'none';
    return;
  }
  // Compter les familles
  const counts = {};
  keys.forEach(k => {
    const [d,s,n] = k.split('|');
    const c = (SCHEDULE[d]?.[s]||[]).find(x=>x.name===n);
    if (!c) return;
    const fam = getGenreFamily(c.genre);
    counts[fam] = (counts[fam]||0) + 1;
  });
  // Trier par fréquence
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  // Garder les 2-3 dominants (seulement si > 1 sélection ou si top)
  const total = keys.length;
  const top = sorted.slice(0,3).filter((e,i)=>i===0||e[1]>1).map(e=>e[0]);
  const text = top.join(' · ');
  document.getElementById('myStyleGenres').textContent = text || '—';
  document.getElementById('myStyleBar').style.display = 'flex';
}

const STAGE_COLORS_MAP = {
  'MAINSTAGE 1':'#7dc44a','MAINSTAGE 2':'#5a9933',
  'WARZONE':'#e8842a','VALLEY':'#9b7fd4',
  'ALTAR':'#c42a2a','TEMPLE':'#5bc4c4'
};
const DAY_ICONS_MAP = {'Jeudi 18':'🔥','Vendredi 19':'⚔️','Samedi 20':'💀','Dimanche 21':'🤘'};

function getTeamScore(key) {
  let score = 0;
  USERS.forEach(u => {
    const t = selections[u.id]?.[key];
    if (t === 'must') score += 2;
    else if (t === 'maybe') score += 1;
    else if (t === 'seen') score += 2;
  });
  return score;
}

function getTeamSelectors(key) {
  return USERS.map(u => {
    const t = selections[u.id]?.[key];
    return t ? {color:u.color, icon:u.icon, type:t} : null;
  }).filter(Boolean);
}

function buildTeamDay(dayName) {
  const dayData = SCHEDULE[dayName];
  // Collecter tous les concerts avec sélections + score
  let candidates = [];
  STAGES.forEach(stage => {
    (dayData[stage]||[]).forEach(c => {
      const key = `${dayName}|${stage}|${c.name}`;
      const score = getTeamScore(key);
      if (score > 0) {
        candidates.push({...c, stage, key, score,
          selectors: getTeamSelectors(key),
          startM: timeToMinutes(c.start),
          endM: timeToMinutes(c.end) <= timeToMinutes(c.start)
            ? timeToMinutes(c.end) + 24*60 : timeToMinutes(c.end)
        });
      }
    });
  });

  // Trier par heure de début
  candidates.sort((a,b) => a.startM - b.startM);

  // Algorithme greedy avec gestion des chevauchements
  let schedule = [];
  let lastEnd = -Infinity;

  while (candidates.length > 0) {
    // Trouver les candidats accessibles (début >= lastEnd - 0 ou offrant >= 20 min)
    let accessible = candidates.filter(c => {
      const overlap = lastEnd - c.startM;
      return overlap <= 0 || (c.endM - lastEnd) >= 20;
    });
    if (!accessible.length) { candidates = []; break; }

    // Grouper par plage temporelle proche (début dans les 20 min)
    const firstStart = accessible[0].startM;
    const window = accessible.filter(c => c.startM - firstStart <= 20);

    if (window.length === 1) {
      // Pas de conflit
      schedule.push({type:'single', concert:window[0]});
      lastEnd = window[0].endM;
      candidates = candidates.filter(c => c !== window[0]);
    } else {
      // Potentiel conflit -- comparer les scores
      window.sort((a,b) => b.score - a.score);
      const best = window[0];
      const second = window[1];
      const scoreDiff = best.score > 0 ? (best.score - second.score) / best.score : 1;

      if (scoreDiff < 0.20 && Math.abs(best.startM - second.startM) < 20) {
        // Ambiguïté -- afficher les deux
        schedule.push({type:'conflict', a:best, b:second});
        // Garder le meilleur pour la suite
        lastEnd = best.endM;
        candidates = candidates.filter(c => c !== best && c !== second);
      } else {
        schedule.push({type:'single', concert:best});
        lastEnd = best.endM;
        candidates = candidates.filter(c => c !== best);
      }
    }
  }

  return schedule;
}

function computeStats(dayName, schedule, seed) {
  var dayData = SCHEDULE[dayName];
  var stageCounts = {};
  STAGES.forEach(function(s){ stageCounts[s]=0; });
  var totalSel = 0;
  STAGES.forEach(function(stage){
    (dayData[stage]||[]).forEach(function(c){
      var key = dayName+'|'+stage+'|'+c.name;
      var hasSel = USERS.some(function(u){ return selections[u.id]&&selections[u.id][key]; });
      if(hasSel){ stageCounts[stage]++; totalSel++; }
    });
  });

  var STAGE_INFO = [
    {key:'MAINSTAGE 1', add:'MAINSTAGE 2', label:'MS1+2', color:'#7dc44a'},
    {key:'WARZONE', label:'Warzone', color:'#e8842a'},
    {key:'VALLEY',  label:'Valley',  color:'#9b7fd4'},
    {key:'ALTAR',   label:'Altar',   color:'#c42a2a'},
    {key:'TEMPLE',  label:'Temple',  color:'#5bc4c4'},
  ];

  var pillsHTML = STAGE_INFO.map(function(s){
    var count = (stageCounts[s.key]||0) + (s.add ? stageCounts[s.add]||0 : 0);
    var pct = totalSel>0 ? Math.round(count/totalSel*100) : 0;
    if(pct===0) return '';
    return '<div class="stage-pill">'
      +'<div class="pill-dot" style="background:'+s.color+';"></div>'
      +'<span class="pill-name">'+s.label+'</span>'
      +'<span class="pill-pct">'+pct+'%</span>'
      +'</div>';
  }).join('');

  // Pool de 10 stats -- on tire 3 par rotation déterministe
  var ALL = [
    function(){ // enthusiasm
      var must=0,maybe=0;
      schedule.forEach(function(item){
        var cs=item.type==='conflict'?[item.a,item.b]:[item.concert];
        cs.forEach(function(c){ c.selectors.forEach(function(s){ if(s.type==='must'||s.type==='seen')must++;else maybe++; }); });
      });
      var tot=must+maybe||1;
      return ['🎯','Enthousiasme','⭐ '+Math.round(must/tot*100)+'% · ? '+Math.round(maybe/tot*100)+'%'];
    },
    function(){ // best concert
      var best=null;
      schedule.forEach(function(item){ var c=item.type==='single'?item.concert:(item.a.score>=item.b.score?item.a:item.b); if(!best||c.score>best.score)best=c; });
      return best ? ['🏆','Le + attendu',best.name.split(' ').slice(0,2).join(' ')] : null;
    },
    function(){ // premier feu
      for(var i=0;i<schedule.length;i++){ if(schedule[i].type==='single'&&schedule[i].concert.selectors.some(function(s){return s.type==='must'||s.type==='seen';})){ return ['🔥','Premier feu',schedule[i].concert.start]; } }
      return null;
    },
    function(){ // temps total
      var mins=0;
      schedule.forEach(function(item){ if(item.type==='single') mins+=item.concert.endM-item.concert.startM; });
      var hh=Math.floor(mins/60),mm=mins%60;
      return ['⏱️','Musique totale',hh+'h'+(mm>0?mm+'min':'')];
    },
    function(){ // dispersion
      var st=new Set();
      schedule.forEach(function(item){ if(item.type==='single')st.add(item.concert.stage);else{st.add(item.a.stage);st.add(item.b.stage);} });
      return ['🗺️','Dispersion team',st.size+' scène'+(st.size>1?'s':'')];
    },
    function(){ // nb conflits
      var conflicts = schedule.filter(function(i){return i.type==='conflict';}).length;
      return ['⚔️','Choix difficiles', conflicts > 0 ? conflicts+' conflit'+(conflicts>1?'s':'') : 'Aucun conflit 🙌'];
    },
    function(){ // scène dominante
      var best='', bestCount=0;
      var labels={'MAINSTAGE 1':'MS1','MAINSTAGE 2':'MS2','WARZONE':'Warzone','VALLEY':'Valley','ALTAR':'Altar','TEMPLE':'Temple'};
      Object.keys(stageCounts).forEach(function(s){ if(stageCounts[s]>bestCount){bestCount=stageCounts[s];best=s;} });
      return ['🎸','Scène favorite', best ? labels[best]+' ('+bestCount+')' : '—'];
    },
    function(){ // dernier concert
      var last=null;
      schedule.forEach(function(item){ if(item.type==='single') last=item.concert; });
      return last ? ['🌙','Fin de soirée',last.end] : null;
    },
    function(){ // solo vs collectif
      var solo=0,multi=0;
      schedule.forEach(function(item){ if(item.type==='single'){ if(item.concert.selectors.length===1)solo++;else multi++; } });
      return ['👥','Solo vs collectif', multi+' collectifs · '+solo+' solo'+(solo>0?' 🐺':'')];
    },
    function(){ return null; } // score total supprimé
  ];

  // Sélectionner 3 stats sans doublon, rotation par seed
  var picked=[], used=new Set();
  for(var i=0;i<ALL.length&&picked.length<3;i++){
    var idx=(seed+i)%ALL.length;
    if(!used.has(idx)){ used.add(idx); var r=ALL[idx](); if(r) picked.push(r); }
  }

  var hlHTML = picked.map(function(p){
    return '<div class="stat-highlight"><span class="stat-hl-icon">'+p[0]+'</span><span class="stat-hl-text">'+p[1]+'</span><span class="stat-hl-val">'+p[2]+'</span></div>';
  }).join('');

  var retained=schedule.filter(function(i){return i.type==='single';}).length;
  var totalDay=Object.values(dayData).reduce(function(s,a){return s+a.length;},0);

  return '<div class="stats-section">'
    +'<div class="stats-title">📊 STATS · '+retained+' concerts / '+totalDay+' au total</div>'
    +'<div class="stage-pills">'+pillsHTML+'</div>'
    +hlHTML+'</div>';
}

  document.body.appendChild(overlay);

    overlay.style.opacity = '0.88';

      currentDay = idx;
      document.querySelectorAll('.nav-btn').forEach(function(b,i){ b.classList.toggle('active', i===idx); });

function encodeSelections(sel) {
  var encoded = {};
  Object.keys(sel).forEach(function(uid) {
    encoded[uid] = {};
    Object.keys(sel[uid]).forEach(function(key) {
      var safeKey = key.replace(/\./g, '·');
      encoded[uid][safeKey] = sel[uid][key];
    });
  });
  return encoded;
}

function decodeSelections(sel) {
  var decoded = {};
  Object.keys(sel).forEach(function(uid) {
    decoded[uid] = {};
    Object.keys(sel[uid]).forEach(function(key) {
      var origKey = key.replace(/·/g, '.');
      decoded[uid][origKey] = sel[uid][key];
    });
  });
  return decoded;
}

function init() {
  loadSelections(); loadUser();
  startFirebaseSync();
  setInterval(updateCurrentTimeLine, 60000);

  setTimeout(checkOrphanSelections, 1000);
  try { if(localStorage.getItem("hf2026_mode")==="light"){ document.body.classList.add("light-mode"); document.getElementById("modeLabel").textContent="☀️ Mode clair"; document.getElementById("modeSwitch").classList.add("on"); } } catch(e){}
  buildUserModal();
  if (!currentUser) openUserModal(); else updateUserDisplay();
  renderDay();
}

function buildUserModal() {
  document.getElementById('userList').innerHTML = USERS.map(u=>`
    <div class="user-item" onclick="selectUser('${u.id}')">
      <div class="user-item-avatar" style="color:${u.color};border-color:${u.color};">${u.icon}</div>
      <span class="user-item-name" style="color:${u.color};">${u.name}</span>
    </div>`).join('');
}

function selectUser(id) {
  currentUser = USERS.find(u=>u.id===id);
  saveUser();
  document.getElementById('userModal').classList.remove('show');
  updateUserDisplay();
  renderDay();
}
function updateUserDisplay() {
  if (!currentUser) return;
  const av=document.getElementById('currentAvatar');
  av.textContent=currentUser.icon; av.style.borderColor=currentUser.color; av.style.color=currentUser.color;
  const nm=document.getElementById('currentName');
  nm.textContent=currentUser.name; nm.style.color=currentUser.color;
}
function openUserModal() { document.getElementById('userModal').classList.add('show'); }

function setDay(idx) { fireTransition(idx);  }

// Calcule la bordure multi-couleurs selon les sélecteurs
function getBorderStyle(selectors) {
  const n = selectors.length;
  if (n === 0) return 'border: 2px solid #2a2a1a;';
  if (n === 1) {
    const c = selectors[0].color;
    return `border: 2px solid ${c};`;
  }
  // Répartition des couleurs sur les 4 côtés
  // top, right, bottom, left
  const sides = [0,1,2,3].map(i => selectors[i % n].color);
  return `border-top: 2px solid ${sides[0]}; border-right: 2px solid ${sides[1]}; border-bottom: 2px solid ${sides[2]}; border-left: 2px solid ${sides[3]};`;
}

function renderDay() {
  const dayName = DAYS[currentDay];
  const {minT, maxT} = getDayBounds(dayName);
  const totalMins = maxT - minT;
  const totalH = Math.ceil(totalMins/60);
  const SLOT_H = 56;

  let timeHTML = '<div class="time-col">';
  for (let m=minT; m<=maxT; m+=60) timeHTML += `<div class="time-slot">${formatTimeLabel(m)}</div>`;
  timeHTML += '</div>';

  let stagesHTML = '<div class="stages-container">';
  STAGES.forEach((stageName, si) => {
    const cls = STAGE_CLASSES[si];
    const concerts = SCHEDULE[dayName][stageName] || [];
    const colH = (totalH+1)*SLOT_H;
    let blocksHTML = '';

    concerts.forEach(c => {
      const top = (timeToMinutes(c.start)-minT)/60*SLOT_H;
      let dur = timeToMinutes(c.end)-timeToMinutes(c.start);
      if (dur<=0) dur+=24*60;
      const height = Math.max(dur/60*SLOT_H-4, 28);
      const key = `${dayName}|${stageName}|${c.name}`;

      // Collecte les sélecteurs
      const selectors = USERS.map(u => {
        const t = selections[u.id]?.[key];
        return t ? {color:u.color, icon:u.icon, type:t, id:u.id} : null;
      }).filter(Boolean);

      const borderStyle = getBorderStyle(selectors);
      const isUnicorn = selectors.length >= 4;
      const minH = 34;
      const heightFinal = Math.max(height, minH);

      // Avatars (max 4 affichés + licorne si 5+)
      let avatarsHTML = '';
      if (isUnicorn) {
        avatarsHTML = `<span style="font-size:16px;">🦄</span><span style="font-size:8px;color:#a89f82;font-family:'Special Elite',serif;align-self:center;white-space:nowrap;">INCONTOURNABLE ×${selectors.length}</span>`;
      } else if (selectors.length > 0) {
        avatarsHTML = '<div class="avatars">' + selectors.map(s=>`
          <div class="av-wrap">
            <div class="av" style="background:${s.color}33;color:${s.color};">${s.icon}</div>
            <div class="av-badge ${s.type==='seen'?'seen':s.type}">${s.type==='seen'?'🤘':s.type==='must'?'⭐':'?'}</div>
          </div>`).join('') + '</div>';
      }

      blocksHTML += `<div class="concert-block" style="top:${top}px;height:${heightFinal}px;${borderStyle}"
        data-band="${c.name}" data-day="${dayName}" data-stage="${stageName}" onclick="openContextFromData(event)">
        <div class="cb-row1">
          <div class="concert-name">${c.name}</div>
          <div class="cb-time-start">${c.start}</div>
        </div>
        <div class="cb-row2">
          <div class="concert-genre">${c.genre} - ${c.country}</div>
          <div class="cb-time-end">${c.end}</div>
        </div>
      </div>${avatarsHTML ? `<div class="av-row-ext" style="top:${top+heightFinal+1}px;">${avatarsHTML}</div>` : ''}`;
    });

    stagesHTML += `<div class="stage-col">
      <div class="stage-header ${cls}">${stageName}</div>
      <div class="stage-body" style="height:${colH}px;">${blocksHTML}</div>
    </div>`;
  });
  stagesHTML += '</div>';

  document.getElementById('gridContainer').innerHTML = timeHTML + stagesHTML;
  applySearchFilter();
  updateCurrentTimeLine();
}


function openContextFromData(e) {
  e.stopPropagation();
  const el = e.currentTarget;
  const bandName = el.getAttribute('data-band');
  const dayName = el.getAttribute('data-day');
  const stageName = el.getAttribute('data-stage');
  openContext(e, bandName, dayName, stageName);
}

function openContext(e, bandName, dayName, stageName) {
  e.stopPropagation();
  if (!currentUser) { openUserModal(); return; }
  pendingConcert = {bandName, dayName, stageName};
  document.getElementById('ctxBand').textContent = bandName;
  const c = (SCHEDULE[dayName][stageName]||[]).find(x=>x.name===bandName);
  if (c) document.getElementById('ctxInfo').textContent = `${c.genre} · ${c.country} · ${c.start}–${c.end}`;
  const menu = document.getElementById('ctxMenu');
  menu.classList.add('show');
  document.getElementById('ctxOverlay').classList.add('show');
  const menuH = menu.offsetHeight || 220; // hauteur réelle ou estimation
  const x = Math.min(e.clientX, window.innerWidth - 260);
  const y = Math.min(e.clientY, window.innerHeight - menuH - 10);
  const yFinal = Math.max(10, y); // ne pas sortir en haut non plus
  menu.style.left = x + 'px';
  menu.style.top = yFinal + 'px';
}
function closeContext() {
  document.getElementById('ctxMenu').classList.remove('show');
  document.getElementById('ctxOverlay').classList.remove('show');
  pendingConcert=null;
}
function selectConcert(type) {
  if (!pendingConcert||!currentUser) return;
  const {bandName,dayName,stageName}=pendingConcert;
  const key=`${dayName}|${stageName}|${bandName}`;
  if (!selections[currentUser.id]) selections[currentUser.id]={};
  if (type===null) delete selections[currentUser.id][key];
  else selections[currentUser.id][key]=type;
  saveSelections(); closeContext(); renderDay(); updateCollective(); computeMyStyle(); 
  showToast(type==='must'?'⭐ À ne pas rater !':type==='maybe'?'? Pourquoi pas !':'✖ Retiré');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}



function applySearchFilter() { /* appel legacy - ne fait rien */ }

function launchSearch() {
  const q=document.getElementById('searchBox')?.value.trim().toLowerCase()||'';
  if (!q) return;

  // Chercher dans tous les jours/scènes
  let found = null;
  for (let di=0; di<DAYS.length; di++) {
    const dayName=DAYS[di];
    for (const stageName of STAGES) {
      const concerts=SCHEDULE[dayName][stageName]||[];
      for (const c of concerts) {
        if (c.name.toLowerCase().includes(q) || c.genre.toLowerCase().includes(q)) {
          found={dayName, stageName, concert:c, dayIdx:di};
          break;
        }
      }
      if(found) break;
    }
    if(found) break;
  }

  if (!found) {
    showToast('❌ Groupe introuvable');
    return;
  }

  // Changer de jour si nécessaire
  closeDrawer();
  setTimeout(()=>{
    if (currentDay !== found.dayIdx) {
      setDay(found.dayIdx);
    }
    // Après rendu, scroller jusqu'au bloc
    setTimeout(()=>{
      // Trouver le bloc par nom
      const blocks = document.querySelectorAll('.concert-block');
      let target = null;
      blocks.forEach(b=>{
        const name=b.querySelector('.concert-name')?.textContent||'';
        if(name.toLowerCase().includes(q)) target=b;
      });
      if (target) {
        const wrapper=document.getElementById('gridWrapper');
        // Scroll horizontal pour mettre la scène en vue
        const stageIdx=STAGES.indexOf(found.stageName);
        const TIME_W=52, COL_W=160;
        const colLeft=TIME_W+stageIdx*COL_W;
        wrapper.scrollLeft=Math.max(0, colLeft-20);
        // Scroll vertical
        const targetTop=target.offsetTop;
        wrapper.scrollTop=Math.max(0, targetTop-80);
        // Highlight
        target.style.outline='3px solid var(--green)';
        target.style.outlineOffset='2px';
        setTimeout(()=>{ target.style.outline=''; target.style.outlineOffset=''; },2500);

      }
    }, found.dayIdx!==currentDay ? 120 : 50);
  }, 300);
}



function toggleMode() {
  const isLight=document.body.classList.toggle('light-mode');
  document.getElementById('modeLabel').textContent=isLight?'☀️ Mode clair':'🌙 Mode sombre';
  document.getElementById('modeSwitch').classList.toggle('on', isLight);
  try { localStorage.setItem('hf2026_mode', isLight?'light':'dark'); } catch(e){}
}

function updateCollective() {
  let html='';
  USERS.forEach(u=>{
    const uSel=selections[u.id]||{};
    const keys=Object.keys(uSel);
    html+=`<div class="collective-user">
      <div class="collective-user-header">
        <div class="collective-avatar" style="color:${u.color};border-color:${u.color};">${u.icon}</div>
        <span class="collective-uname" style="color:${u.color};">${u.name}</span>
      </div>
      <div class="collective-concerts">`;
    if (!keys.length) { html+=`<div class="no-selections">Aucune sélection</div>`; }
    else {
      keys.sort((a,b)=>{
        const [dA,nA]=a.split('|'), [dB,nB]=b.split('|');
        const di=DAYS.indexOf(dA)-DAYS.indexOf(dB);
        if(di) return di;
        const stA=a.split('|')[1], stB=b.split('|')[1];
        const cA=(SCHEDULE[dA]?.[stA]||[]).find(x=>x.name===nA);
        const cB=(SCHEDULE[dB]?.[stB]||[]).find(x=>x.name===nB);
        return timeToMinutes(cA?.start||'00:00')-timeToMinutes(cB?.start||'00:00');
      }).forEach(k=>{
        const [dayN,stN,nm]=k.split('|');
        const type=uSel[k];
        const c=(SCHEDULE[dayN]?.[stN]||[]).find(x=>x.name===nm);
        const dayShort=dayN.split(' ')[1];
        html+=`<div class="collective-concert">
          <span class="cc-icon" style="color:${type==='must'?'var(--green)':type==='seen'?'#9b7fd4':'var(--orange)'};">${type==='must'?'⭐':type==='seen'?'🤘':'?'}</span>
          <span class="cc-text">${nm} <span style="color:var(--cream2);font-size:10px;">(${dayShort} ${c?.start||''})</span></span>
        </div>`;
      });
    }
    html+=`</div></div>`;
  });
  document.getElementById('collectiveView').innerHTML=html;
}

init();
</script>
